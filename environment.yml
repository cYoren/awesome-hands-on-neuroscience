name: hands-on-neuroscience
channels:
  - conda-forge
  - defaults
dependencies:
  # Core
  - python>=3.10
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - pandas>=2.0
  - scikit-learn>=1.3
  - seaborn>=0.12

  # Jupyter
  - jupyterlab>=4.0
  - ipywidgets>=8.0

  # Neuroimaging
  - nibabel>=5.0
  - nilearn>=0.10

  # MEG/EEG
  - mne>=1.6

  # Graph analysis
  - networkx>=3.0

  # Utilities
  - tqdm>=4.65
  - requests>=2.28
  - h5py>=3.8

  # Pip-only packages
  - pip:
    - brian2>=2.7
    - neurolib>=0.6
    - netpyne>=1.0
    - antspyx>=0.4
    - pybids>=0.16
    - neuromaps>=0.0.5
    - datalad>=0.19
